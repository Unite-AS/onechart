suite: test external secret
templates:
  - externalSecret.yaml
tests:
  - it: Should not render ExternalSecret by default
    asserts:
      - hasDocuments:
          count: 0

  - it: Should render ExternalSecret when externalSecret is enabled
    set:
      secretName: app-secrets
      externalSecret:
        enabled: true
        key: app-secrets-key
        refreshInterval: 30m
        secretStoreRef:
          name: my-kv
          kind: ClusterSecretStore
    release:
      namespace: platform
    asserts:
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - equal:
          path: kind
          value: ExternalSecret
      - equal:
          path: metadata.name
          value: app-secrets
      - equal:
          path: metadata.namespace
          value: platform
      - equal:
          path: spec.refreshInterval
          value: 30m
      - equal:
          path: spec.secretStoreRef.name
          value: my-kv
      - equal:
          path: spec.secretStoreRef.kind
          value: ClusterSecretStore
      - equal:
          path: spec.dataFrom[0].extract.key
          value: app-secrets-key

  - it: Should render multiple ExternalSecret resources from externalSecrets
    set:
      externalSecrets:
        - name: app-secrets
          key: app-secrets-key
          refreshInterval: 30m
          secretStoreRef:
            name: my-kv
            kind: ClusterSecretStore
        - name: db-secrets
          key: db-secrets-key
          secretStoreRef:
            name: team-kv
    release:
      namespace: platform
    asserts:
      - hasDocuments:
          count: 2

  - it: Should default values for an externalSecrets entry
    set:
      externalSecrets:
        - name: db-secrets
          secretStoreRef:
            name: team-kv
    asserts:
      - equal:
          path: spec.refreshInterval
          value: 1h0m0s
      - equal:
          path: spec.secretStoreRef.name
          value: team-kv
      - equal:
          path: spec.secretStoreRef.kind
          value: ClusterSecretStore
      - equal:
          path: spec.dataFrom[0].extract.key
          value: db-secrets
