suite: test cron job
templates:
  - cronJob.yaml
tests:
  - it: Should set default security context
    asserts:
      - template: cronJob.yaml
        documentIndex: 0
        equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - template: cronJob.yaml
        documentIndex: 0
        equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.runAsUser
          value: 621
      - template: cronJob.yaml
        documentIndex: 0
        equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
  - it: Should merge security context with defaults
    set:
      securityContext:
        runAsNonRoot: false
        allowPrivilegeEscalation: false
    asserts:
      - template: cronJob.yaml
        documentIndex: 0
        equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: false
      - template: cronJob.yaml
        documentIndex: 0
        equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.runAsUser
          value: 621
      - template: cronJob.yaml
        documentIndex: 0
        equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
