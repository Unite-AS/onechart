image:
  repository: debian
  tag: stable-slim

schedule: "*/1 * * * *"
command: |
  echo "I'm alive"
overrideCommand: true
shell: "/bin/sh"

nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 999
  runAsUser: 621
  runAsNonRoot: true
  runAsGroup: 999

securityContext: {}

resources: {}

nodeSelector: {}

tolerations:
  - key: "kubernetes.azure.com/scalesetpriority"
    operator: "Equal"
    value: "spot"
    effect: "NoSchedule"

affinity: {}

secret:
  enabled: false

externalSecrets: []

externalSecret:
  enabled: false
  # Defaults to secretName when omitted.
  key: ""
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: azure-key-vault
    kind: ClusterSecretStore

constraints:
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
