{{- $externalSecrets := .Values.externalSecrets | default (list) -}}
{{- if and (eq (len $externalSecrets) 0) (and .Values.externalSecret .Values.externalSecret.enabled) -}}
{{- $externalSecrets = list (dict
  "name" .Values.secretName
  "key" .Values.externalSecret.key
  "refreshInterval" .Values.externalSecret.refreshInterval
  "secretStoreRef" .Values.externalSecret.secretStoreRef
) -}}
{{- end -}}

{{- range $es := $externalSecrets }}
{{- $name := required "name is required for each externalSecrets entry" (default $.Values.secretName $es.name) -}}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $name | quote }}
  namespace: {{ $.Release.Namespace }}
spec:
  refreshInterval: {{ default "1h0m0s" $es.refreshInterval | quote }}
  secretStoreRef:
    name: {{ dig "secretStoreRef" "name" "azure-key-vault" $es | quote }}
    kind: {{ dig "secretStoreRef" "kind" "ClusterSecretStore" $es | quote }}
  dataFrom:
    - extract:
        key: {{ default $name $es.key | quote }}
{{ end }}
