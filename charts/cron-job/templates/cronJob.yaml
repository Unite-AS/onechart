apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helm-chart.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  {{- with .Values.constraints }}
    {{- toYaml . | nindent 2 }}
  {{- end }}
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            {{- with .Values.podAnnotations }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- range . }}
            - name: {{ . }}
            {{- end }}
          {{- end }}
          {{- if .Values.podSecurityContext }}
          securityContext:
            runAsNonRoot: {{ hasKey .Values.podSecurityContext "runAsNonRoot" | ternary .Values.podSecurityContext.runAsNonRoot true }}
            runAsUser: {{ hasKey .Values.podSecurityContext "runAsUser" | ternary .Values.podSecurityContext.runAsUser 621 }}
            runAsGroup: {{ hasKey .Values.podSecurityContext "runAsGroup" | ternary .Values.podSecurityContext.runAsGroup 999 }}
            {{- range $key, $value := .Values.podSecurityContext }}
            {{- if not (or (eq $key "runAsNonRoot") (eq $key "runAsUser") (eq $key "runAsGroup")) }}
            {{ $key }}: {{ $value }}
            {{- end }}
            {{- end }}
          {{- else }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 621
            runAsGroup: 999
          {{- end }}
          restartPolicy: Never
          containers:
            - name: {{ .Release.Name }}
              {{- if .Values.securityContext }}
              securityContext:
                runAsNonRoot: {{ hasKey .Values.securityContext "runAsNonRoot" | ternary .Values.securityContext.runAsNonRoot true }}
                runAsUser: {{ hasKey .Values.securityContext "runAsUser" | ternary .Values.securityContext.runAsUser 621 }}
                runAsGroup: {{ hasKey .Values.securityContext "runAsGroup" | ternary .Values.securityContext.runAsGroup 999 }}
                readOnlyRootFilesystem: {{ hasKey .Values.securityContext "readOnlyRootFilesystem" | ternary .Values.securityContext.readOnlyRootFilesystem true }}
                allowPrivilegeEscalation: {{ hasKey .Values.securityContext "allowPrivilegeEscalation" | ternary .Values.securityContext.allowPrivilegeEscalation false }}
                {{- range $key, $value := .Values.securityContext }}
                {{- if not (or (eq $key "runAsNonRoot") (eq $key "runAsUser") (eq $key "runAsGroup") (eq $key "readOnlyRootFilesystem") (eq $key "allowPrivilegeEscalation")) }}
                {{ $key }}: {{ $value }}
                {{- end }}
                {{- end }}
              {{- else }}
              securityContext:
                runAsNonRoot: true
                runAsUser: 621
                runAsGroup: 999
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
              {{- end }}
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              {{- if .Values.vars }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              {{- end }}
              {{- if .Values.overrideCommand }}
              command:
                - {{ .Values.shell }}
                - -c
                - {{ .Values.command | quote }}
              {{- end }}
              {{- include "common.envFromRef.tpl" . | nindent 14 }}
              {{- include "common.volumeMountsRef.tpl" . | nindent 14 }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
          {{- include "common.volumesRef.tpl" . | nindent 10 }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
