{{- if and .Values.rollout .Values.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ template "robustName" .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helm-chart.labels" . | nindent 4 }}
  annotations:
    kubectl.kubernetes.io/default-container: {{ template "robustName" .Release.Name }}
    {{- if .Values.gitSha }}
    unite.as/git-sha: {{ .Values.gitSha }}
    v1alpha1.opensca.dev/version.sha: {{ .Values.gitSha }}
    {{- end }}
    {{- if .Values.gitBranch }}
    unite.as/git-branch: {{ .Values.gitBranch }}
    v1alpha1.opensca.dev/version.branch: {{ .Values.gitBranch }}
    {{- end }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "helm-chart.selectorLabels" . | nindent 6 }}
  strategy:
    blueGreen:
      activeService: {{ include "onechart.activeServiceName" . }}
      previewService: {{ include "onechart.previewServiceName" . }}
      autoPromotionEnabled: {{ ternary .Values.rollout.blueGreen.autoPromotionEnabled true (and .Values.rollout.blueGreen (hasKey .Values.rollout.blueGreen "autoPromotionEnabled")) }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.gitSha }}
        unite.as/git-sha: {{ .Values.gitSha }}
        {{- end }}
        {{- if .Values.gitRepository }}
        unite.as/git-repository: {{ .Values.gitRepository }}
        {{- end }}
      labels:
        {{- with .Values.podLabels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "helm-chart.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- $podSpecTpl := include "common.podSpec.tpl" . | fromYaml }}
      {{- $podSpec := mergeOverwrite $podSpecTpl .Values.podSpec }}
      {{- toYaml $podSpec | nindent 6 }}
{{- end }}

