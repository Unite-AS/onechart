{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ required "secretName is required when externalSecret.enabled=true" .Values.secretName | quote }}
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ default "1h0m0s" .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ default "azure-key-vault" .Values.externalSecret.secretStoreRef.name | quote }}
    kind: {{ default "ClusterSecretStore" .Values.externalSecret.secretStoreRef.kind | quote }}
  dataFrom:
    - extract:
        key: {{ default .Values.secretName .Values.externalSecret.key | quote }}
{{- end }}

