image:
  repository: nginx
  tag: "latest"
  pullPolicy: IfNotPresent

# ingress:
#   name: myapp-public
#   host: chart-example.local
#   ingressClassName: nginx
#   tlsEnabled: true
#   annotations:
#     cert-manager.io/cluster-issuer: letsencrypt-staging
#   nginxBasicAuth:
#     user: admin
#     password: secret

# vars:
#   MY_VAR: "value"

replicas: 1

rollout:
  enabled: false
  blueGreen:
    activeService: ""
    previewService: ""
    autoPromotionEnabled: true
    previewIngress:
      private: true

nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podLabels: {}

podSecurityContext:
  fsGroup: 999
  runAsUser: 621
  runAsNonRoot: true
  runAsGroup: 999

securityContext: {}

containerPort: 80

resources:
  requests:
    cpu: "200m"
    memory: "200Mi"
  limits:
    cpu: "200m"
    memory: "200Mi"

nodeSelector: {}

tolerations:
  - key: "kubernetes.azure.com/scalesetpriority"
    operator: "Equal"
    value: "spot"
    effect: "NoSchedule"

probe:
  enabled: false
  path: "/"
  settings:
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 3
    failureThreshold: 3

# Before you use a liveness probe: https://srcco.de/posts/kubernetes-liveness-probes-are-dangerous.html
livenessProbe:
  enabled: false
  path: "/"
  settings:
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 3
    failureThreshold: 3

startupProbe:
  enabled: false
  path: "/"
  settings:
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 3
    failureThreshold: 3

secretEnabled: false

shell: "/bin/sh"

podDisruptionBudgetEnabled: true
spreadAcrossNodes: false

nodePortEnabled: false

# Set true to enable service monitor.
monitor:
  enabled: false

autoscale:
  enabled: false
  minReplicas: 1

container: {}
podSpec: {}

externalSecret:
  enabled: false
  # Defaults to secretName when omitted.
  key: ""
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: azure-key-vault
    kind: ClusterSecretStore

postgresqlDatabase:
  enabled: false
  # Defaults to release name when omitted.
  projectName: ""
  resourceGroupName: ""
  skuName: B_Standard_B1ms
  autoGrow: false
  publicNetworkAccess: true
  privateDnsZoneId: ""
  backupRetentionDays: 7
  delegatedSubnetId: ""
  highAvailability:
    mode: ""
    standbyZone: ""
