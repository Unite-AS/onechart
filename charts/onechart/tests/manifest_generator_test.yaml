suite: test manifest generator
templates:
  - manifestGenerator.yaml
tests:
  - it: Should not render ManifestGenerator by default
    asserts:
      - hasDocuments:
          count: 0

  - it: Should render required manifest generator fields
    set:
      manifestGenerator:
        enabled: true
        name: unite-as
        persistentVolumeClaim:
          storageGi: 20Gi
    release:
      namespace: platform
    asserts:
      - equal:
          path: apiVersion
          value: unite.as/v1
      - equal:
          path: kind
          value: ManifestGenerator
      - equal:
          path: metadata.name
          value: unite-as
      - equal:
          path: metadata.namespace
          value: platform
      - equal:
          path: spec.name
          value: unite-as
      - equal:
          path: spec.persistentVolumeClaim.storageGi
          value: 20Gi

  - it: Should render optional manifest generator fields
    set:
      manifestGenerator:
        enabled: true
        name: unite-as
        externalSecrets:
          key: app-secrets
        persistentVolumeClaim:
          storageGi: 50Gi
          accessModes:
            - ReadWriteOnce
          storageClassName:
            - managed-csi
        azure:
          resourceGroupName: rg-platform
        database:
          type: postgresql
          postgresql:
            skuName: B_Standard_B1ms
            autoGrow: true
            publicNetworkAccess: false
            privateDnsZoneId: /subscriptions/test/resourceGroups/rg/providers/Microsoft.Network/privateDnsZones/postgres.database.azure.com
            backupRetentionDays: 14
            delegatedSubnetId: /subscriptions/test/resourceGroups/rg/providers/Microsoft.Network/virtualNetworks/vnet/subnets/postgres
            highAvailability:
              mode: ZoneRedundant
              standbyZone: true
    asserts:
      - equal:
          path: spec.externalSecrets.key
          value: app-secrets
      - equal:
          path: spec.persistentVolumeClaim.accessModes
          value:
            - ReadWriteOnce
      - equal:
          path: spec.persistentVolumeClaim.storageClassName
          value:
            - managed-csi
      - equal:
          path: spec.azure.resourceGroupName
          value: rg-platform
      - equal:
          path: spec.database.type
          value: postgresql
      - equal:
          path: spec.database.postgresql.highAvailability.mode
          value: ZoneRedundant
      - equal:
          path: spec.database.postgresql.highAvailability.standbyZone
          value: true

