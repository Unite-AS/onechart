suite: test argo rollout bluegreen
templates:
  - configmap.yaml
  - deployment.yaml
  - rollout.yaml
  - service.yaml
  - ingress.yaml
  - horizontal-pod-autoscaler.yaml
tests:
  - it: Should render Rollout and skip Deployment when rollout is enabled
    set:
      rollout:
        enabled: true
    asserts:
      - template: rollout.yaml
        hasDocuments:
          count: 1
      - template: rollout.yaml
        documentIndex: 0
        equal:
          path: kind
          value: Rollout
      - template: deployment.yaml
        hasDocuments:
          count: 0

  - it: Should use default active and preview services
    set:
      rollout:
        enabled: true
    asserts:
      - template: rollout.yaml
        documentIndex: 0
        equal:
          path: spec.strategy.blueGreen.activeService
          value: release-name
      - template: rollout.yaml
        documentIndex: 0
        equal:
          path: spec.strategy.blueGreen.previewService
          value: release-name-preview
      - template: service.yaml
        hasDocuments:
          count: 2
      - template: service.yaml
        documentIndex: 0
        equal:
          path: metadata.name
          value: release-name
      - template: service.yaml
        documentIndex: 1
        equal:
          path: metadata.name
          value: release-name-preview

  - it: Should support custom active and preview service names
    set:
      rollout:
        enabled: true
        blueGreen:
          activeService: my-active
          previewService: my-preview
          previewIngress:
            private: false
      ingress:
        host: chart-example.local
    asserts:
      - template: rollout.yaml
        documentIndex: 0
        equal:
          path: spec.strategy.blueGreen.activeService
          value: my-active
      - template: rollout.yaml
        documentIndex: 0
        equal:
          path: spec.strategy.blueGreen.previewService
          value: my-preview
      - template: service.yaml
        hasDocuments:
          count: 3
      - template: service.yaml
        documentIndex: 0
        equal:
          path: metadata.name
          value: release-name
      - template: service.yaml
        documentIndex: 1
        equal:
          path: metadata.name
          value: my-active
      - template: service.yaml
        documentIndex: 2
        equal:
          path: metadata.name
          value: my-preview
      - template: ingress.yaml
        hasDocuments:
          count: 2
      - template: ingress.yaml
        documentIndex: 0
        equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: my-active
      - template: ingress.yaml
        documentIndex: 1
        equal:
          path: spec.rules[0].host
          value: my-preview.local
      - template: ingress.yaml
        documentIndex: 1
        equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: my-preview

  - it: Should render public preview ingress when explicitly enabled
    set:
      rollout:
        enabled: true
        blueGreen:
          previewIngress:
            private: false
      ingress:
        host: chart-example.local
    asserts:
      - template: ingress.yaml
        hasDocuments:
          count: 2
      - template: ingress.yaml
        documentIndex: 0
        equal:
          path: spec.rules[0].host
          value: chart-example.local
      - template: ingress.yaml
        documentIndex: 0
        equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: release-name
      - template: ingress.yaml
        documentIndex: 1
        equal:
          path: metadata.name
          value: release-name-preview
      - template: ingress.yaml
        documentIndex: 1
        equal:
          path: spec.ingressClassName
          value: kong
      - template: ingress.yaml
        documentIndex: 1
        equal:
          path: metadata.annotations
          value:
            konghq.com/strip-path: "true"
            konghq.com/https-redirect-status-code: "301"
            konghq.com/protocols: https
      - template: ingress.yaml
        documentIndex: 1
        equal:
          path: spec.rules[0].host
          value: release-name-preview.local
      - template: ingress.yaml
        documentIndex: 1
        equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: release-name-preview

  - it: Should default preview ingress to private tailscale
    set:
      rollout:
        enabled: true
      ingress:
        host: chart-example.local
    asserts:
      - template: ingress.yaml
        hasDocuments:
          count: 2
      - template: ingress.yaml
        documentIndex: 1
        equal:
          path: metadata.name
          value: release-name-preview
      - template: ingress.yaml
        documentIndex: 1
        equal:
          path: spec.ingressClassName
          value: tailscale
      - template: ingress.yaml
        documentIndex: 1
        equal:
          path: metadata.annotations
          value:
            tailscale.com/hostname: release-name-preview
            tailscale.com/http-redirect: "true"
      - template: ingress.yaml
        documentIndex: 1
        equal:
          path: spec.tls
          value:
            - hosts:
                - release-name-preview
      - template: ingress.yaml
        documentIndex: 1
        notExists:
          path: spec.rules[0].host
      - template: ingress.yaml
        documentIndex: 1
        equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: release-name-preview

  - it: Should render private preview ingress without ingress host
    set:
      rollout:
        enabled: true
    asserts:
      - template: ingress.yaml
        hasDocuments:
          count: 1
      - template: ingress.yaml
        documentIndex: 0
        equal:
          path: metadata.name
          value: release-name-preview
      - template: ingress.yaml
        documentIndex: 0
        equal:
          path: spec.ingressClassName
          value: tailscale
      - template: ingress.yaml
        documentIndex: 0
        equal:
          path: metadata.annotations
          value:
            tailscale.com/hostname: release-name-preview
            tailscale.com/http-redirect: "true"
      - template: ingress.yaml
        documentIndex: 0
        notExists:
          path: spec.rules[0].host
      - template: ingress.yaml
        documentIndex: 0
        equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: release-name-preview

  - it: Should render one public preview ingress for ingresses list
    set:
      rollout:
        enabled: true
        blueGreen:
          previewIngress:
            private: false
      ingresses:
        - host: www.unite.as
          annotations:
            konghq.com/https-redirect-status-code: "301"
            konghq.com/protocols: "https"
            konghq.com/strip-path: "true"
        - host: unite.as
          annotations:
            konghq.com/https-redirect-status-code: "301"
            konghq.com/protocols: "https"
            konghq.com/strip-path: "true"
        - host: www.unite.as
          name: www-unite-as-deny-public-metrics
          annotations:
            konghq.com/plugins: deny-metrics
            konghq.com/protocols: https
          paths:
            - path: /api/metrics
              pathType: Prefix
        - host: unite.as
          name: unite-as-deny-public-metrics
          annotations:
            konghq.com/plugins: deny-metrics
            konghq.com/protocols: https
          paths:
            - path: /api/metrics
              pathType: Prefix
    asserts:
      - template: ingress.yaml
        hasDocuments:
          count: 5
      - template: ingress.yaml
        documentIndex: 0
        equal:
          path: metadata.name
          value: release-name-preview
      - template: ingress.yaml
        documentIndex: 0
        equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: release-name-preview
      - template: ingress.yaml
        documentIndex: 0
        equal:
          path: spec.rules[0].host
          value: release-name-preview.unite.as
      - template: ingress.yaml
        documentIndex: 3
        equal:
          path: metadata.name
          value: www-unite-as-deny-public-metrics

  - it: Should default autoPromotionEnabled to true
    set:
      rollout:
        enabled: true
    asserts:
      - template: rollout.yaml
        documentIndex: 0
        equal:
          path: spec.strategy.blueGreen.autoPromotionEnabled
          value: true

  - it: Should allow disabling autoPromotionEnabled
    set:
      rollout:
        enabled: true
        blueGreen:
          autoPromotionEnabled: false
    asserts:
      - template: rollout.yaml
        documentIndex: 0
        equal:
          path: spec.strategy.blueGreen.autoPromotionEnabled
          value: false

  - it: Should target Rollout in HPA when rollout is enabled
    set:
      rollout:
        enabled: true
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
      autoscale:
        enabled: true
        minReplicas: 1
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
    asserts:
      - template: horizontal-pod-autoscaler.yaml
        documentIndex: 0
        equal:
          path: spec.scaleTargetRef.apiVersion
          value: argoproj.io/v1alpha1
      - template: horizontal-pod-autoscaler.yaml
        documentIndex: 0
        equal:
          path: spec.scaleTargetRef.kind
          value: Rollout
