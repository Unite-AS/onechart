suite: test postgresql database
templates:
  - postgresqlDatabase.yaml
tests:
  - it: Should not render PostgreSQLDatabase by default
    asserts:
      - hasDocuments:
          count: 0

  - it: Should render PostgreSQLDatabase when enabled
    set:
      postgresqlDatabase:
        enabled: true
        projectName: cart
        resourceGroupName: rg-platform-dev
        skuName: Standard_D2s_v3
        autoGrow: true
        publicNetworkAccess: true
        privateDnsZoneId: /subscriptions/123/resourceGroups/rg-platform-dev/providers/Microsoft.Network/privateDnsZones/postgres.database.azure.com
        backupRetentionDays: 14
        delegatedSubnetId: /subscriptions/123/resourceGroups/rg-platform-dev/providers/Microsoft.Network/virtualNetworks/vnet/subnets/postgres
        highAvailability:
          mode: ZoneRedundant
          standbyZone: "2"
    release:
      namespace: platform
    asserts:
      - equal:
          path: apiVersion
          value: unite.as/v1alpha1
      - equal:
          path: kind
          value: PostgreSQLDatabase
      - equal:
          path: metadata.name
          value: cart-postgresql-server
      - equal:
          path: metadata.namespace
          value: platform
      - equal:
          path: spec.projectName
          value: cart
      - equal:
          path: spec.resourceGroupName
          value: rg-platform-dev
      - equal:
          path: spec.skuName
          value: Standard_D2s_v3
      - equal:
          path: spec.autoGrow
          value: true
      - equal:
          path: spec.publicNetworkAccess
          value: true
      - equal:
          path: spec.privateDnsZoneId
          value: /subscriptions/123/resourceGroups/rg-platform-dev/providers/Microsoft.Network/privateDnsZones/postgres.database.azure.com
      - equal:
          path: spec.backupRetentionDays
          value: 14
      - equal:
          path: spec.delegatedSubnetId
          value: /subscriptions/123/resourceGroups/rg-platform-dev/providers/Microsoft.Network/virtualNetworks/vnet/subnets/postgres
      - equal:
          path: spec.highAvailabilityMode
          value: ZoneRedundant
      - equal:
          path: spec.highAvailabilityStandbyZone
          value: "2"

  - it: Should default projectName to release name when omitted
    set:
      postgresqlDatabase:
        enabled: true
        resourceGroupName: rg-platform-dev
    release:
      name: my-release
    asserts:
      - equal:
          path: metadata.name
          value: my-release-postgresql-server
      - equal:
          path: spec.projectName
          value: my-release
      - equal:
          path: spec.skuName
          value: B_Standard_B1ms
      - equal:
          path: spec.autoGrow
          value: false
      - equal:
          path: spec.publicNetworkAccess
          value: true
      - equal:
          path: spec.backupRetentionDays
          value: 7
      - equal:
          path: spec.highAvailabilityMode
          value: ""
      - equal:
          path: spec.highAvailabilityStandbyZone
          value: ""

  - it: Should fail when highAvailability.mode is set without standbyZone
    set:
      postgresqlDatabase:
        enabled: true
        highAvailability:
          mode: ZoneRedundant
    asserts:
      - failedTemplate:
          errorMessage: postgresqlDatabase.highAvailability.mode and postgresqlDatabase.highAvailability.standbyZone must both be set when highAvailability is configured

  - it: Should fail when highAvailability.standbyZone is set without mode
    set:
      postgresqlDatabase:
        enabled: true
        highAvailability:
          standbyZone: "1"
    asserts:
      - failedTemplate:
          errorMessage: postgresqlDatabase.highAvailability.mode and postgresqlDatabase.highAvailability.standbyZone must both be set when highAvailability is configured

