suite: test external secret
templates:
  - externalSecret.yaml
tests:
  - it: Should not render ExternalSecret by default
    asserts:
      - hasDocuments:
          count: 0

  - it: Should not render ExternalSecret when externalSecret is disabled
    set:
      secretName: app-secrets
      externalSecret:
        enabled: false
        key: app-secrets-key
    asserts:
      - hasDocuments:
          count: 0

  - it: Should render ExternalSecret when externalSecret is enabled
    set:
      secretName: app-secrets
      externalSecret:
        enabled: true
        key: app-secrets-key
        refreshInterval: 30m
        secretStoreRef:
          name: my-kv
          kind: ClusterSecretStore
    release:
      namespace: platform
    asserts:
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - equal:
          path: kind
          value: ExternalSecret
      - equal:
          path: metadata.name
          value: app-secrets
      - equal:
          path: metadata.namespace
          value: platform
      - equal:
          path: spec.refreshInterval
          value: 30m
      - equal:
          path: spec.secretStoreRef.name
          value: my-kv
      - equal:
          path: spec.secretStoreRef.kind
          value: ClusterSecretStore
      - equal:
          path: spec.dataFrom[0].extract.key
          value: app-secrets-key

  - it: Should default extract key to secretName when externalSecret.key is not set
    set:
      secretName: app-secrets
      externalSecret:
        enabled: true
    asserts:
      - equal:
          path: spec.dataFrom[0].extract.key
          value: app-secrets

