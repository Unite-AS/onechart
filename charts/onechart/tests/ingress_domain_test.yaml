suite: test deployment
templates:
  - ingress.yaml
tests:
  - it: Should set Ingress host name
    set:
      ingress:
        host: chart-example.local
        tlsEnabled: true
    asserts:
      - equal:
          path: spec.tls
          value:
            - hosts:
                - chart-example.local
              secretName: tls-release-name
      - equal:
          path: spec.rules
          value:
            - host: chart-example.local
              http:
                paths:
                  - path: "/"
                    pathType: "Prefix"
                    backend:
                      service:
                        name: release-name
                        port:
                          number: 80
  - it: Should set defaults
    set:
      ingress:
        host: chart-example.local
    asserts:
      - equal:
          path: spec.rules
          value:
            - host: chart-example.local
              http:
                paths:
                  - path: "/"
                    pathType: "Prefix"
                    backend:
                      service:
                        name: release-name
                        port:
                          number: 80
  - it: Should set Ingress annotation
    set:
      ingress:
        host: chart-example.local
        annotations:
          just/a-random: annotation
    asserts:
      - equal:
          path: metadata.annotations
          value:
            just/a-random: annotation
  - it: Should set ingress class
    set:
      ingress:
        host: chart-example.local
        ingressClassName: nginx
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx
  - it: Should set Ingress name if provided
    set:
      ingress:
        name: metrics-private
        host: chart-example.local
    asserts:
      - equal:
          path: metadata.name
          value: metrics-private
  - it: Should generate multiple ingresses
    set:
      ingresses:
      - host: chart-example.local
        annotations:
          kubernetes.io/ingress.class: kong
      - host: another.local
        annotations:
          kubernetes.io/ingress.class: kong
    asserts:
      - hasDocuments:
          count: 2
  - it: Should generate multiple ingresses
    set:
      ingress:
        host: chart-example.local
        annotations:
          kubernetes.io/ingress.class: kong
      ingresses:
        - host: chart-example.local
          annotations:
            kubernetes.io/ingress.class: kong
        - host: another.local
          annotations:
            kubernetes.io/ingress.class: kong
    asserts:
      - hasDocuments:
          count: 3
  - it: Should have unique TLS secret names
    set:
      ingresses:
        - host: chart-example.local
          tlsEnabled: true
          annotations:
            kubernetes.io/ingress.class: kong
        - host: another.local
          tlsEnabled: true
          annotations:
            kubernetes.io/ingress.class: kong
    asserts:
      - documentIndex: 0
        equal:
          path: spec.tls
          value:
            - hosts:
                - chart-example.local
              secretName: tls-release-name-chart-example-local
  - it: Should support multiple ingresses for the same host with explicit names
    set:
      ingresses:
        - name: app-public
          host: chart-example.local
        - name: app-metrics-private
          host: chart-example.local
          paths:
            - path: /metrics
              pathType: Exact
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        equal:
          path: metadata.name
          value: app-public
      - documentIndex: 1
        equal:
          path: metadata.name
          value: app-metrics-private
  - it: Should support same-host ingresses with different classes and annotations
    set:
      ingresses:
        - name: app-public
          host: chart-example.local
          ingressClassName: public-nginx
        - name: app-metrics-private
          host: chart-example.local
          ingressClassName: private-nginx
          annotations:
            nginx.ingress.kubernetes.io/whitelist-source-range: 10.0.0.0/8
          paths:
            - path: /metrics
              pathType: Exact
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        equal:
          path: spec.ingressClassName
          value: public-nginx
      - documentIndex: 0
        notExists:
          path: metadata.annotations
      - documentIndex: 1
        equal:
          path: spec.ingressClassName
          value: private-nginx
      - documentIndex: 1
        equal:
          path: metadata.annotations
          value:
            nginx.ingress.kubernetes.io/whitelist-source-range: 10.0.0.0/8
  - it: Should set Ingress secret name if provided
    set:
      ingress:
        host: chart-example.local
        tlsEnabled: true
        secretName: tls-internal
    asserts:
      - equal:
          path: spec.tls
          value:
            - hosts:
                - chart-example.local
              secretName: tls-internal
